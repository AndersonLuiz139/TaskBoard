<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskBoard</title>
  <link rel="shortcut icon" href="assets/img/favicon.png" type="image/x-icon">
</head>
<body>
  <main class="app">
    <section class="todo-card">
      <header class="header">
        <div>
          <p class="tag">Organização Pessoal</p>
          <h1>TaskBoard</h1>
          <p class="subtitle">Gerencie suas tarefas com mais praticidade.</p>
        </div>
      </header>

      <section class="new-tarefa">
        <input type="text" class="input-tarefa" placeholder="Digite sua tarefa...">
      </section>

      <section class="topbar">
        <div class="info">
          <span>Total: <strong class="total">0</strong></span>
        </div>

        <div class="filtros">
          <button class="filtro-ativo" data-filtro="todas">Todas</button>
          <button class="filtro" data-filtro="pedentes">Todas</button>
          <button class="filtro ativo" data-filtro="concluidas">Todas</button>
        </div>
      </section>

      <ul class="tarefas"></ul>
      
      <p class="mensagem-vazia">Você ainda não adicionou nenhuma tarefa.</p>

      <div class="rodape-acoes">
        <button class="btn-limpar">Limpar concluídas</button>
      </div>
    </section>
  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
