<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskBoard</title>
  <link rel="shortcut icon" href="assets/img/favicon.png" type="image/x-icon">
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>
  <main class="app">
    <section class="todo-card">
      <header class="header">
        <div>
          <p class="tag">Organização pessoal</p>
          <h1>TaskBoard</h1>
          <p class="subtitle">Gerencie suas tarefas com mais praticidade.</p>
        </div>
      </header>

      <section class="nova-tarefa">
        <input type="text" class="input-tarefa" placeholder="Digite sua tarefa..."/>
        <button class="btn-tarefa">Adicionar</button>
      </section>

      <section class="topbar">
        <div class="info">
          <span>Total: <strong id="total">0</strong></span>
        </div>

        <div class="filtros">
          <button class="filtro ativo" data-filtro="todas">Todas</button>
          <button class="filtro" data-filtro="pendentes">Pendentes</button>
          <button class="filtro" data-filtro="concluidas">Concluídas</button>
        </div>
      </section>

      <ul class="tarefas"></ul>

      <p class="mensagem-vazia">Você ainda não adicionou nenhuma tarefa.</p>

      <div class="rodape-acoes">
        <button class="btn-limpar">Limpar concluídas</button>
      </div>
    </section>
  </main>

    <div class="modal-overlay hidden modal-editar-overlay">
    <div class="modal">
      <h2>Editar tarefa</h2>
      <p class="modal-texto">Altere o texto da sua tarefa.</p>

      <input
        type="text"
        class="input-editar"
        placeholder="Edite sua tarefa"
      />

      <div class="modal-acoes">
        <button class="btn-cancelar">Cancelar</button>
        <button class="btn-salvar">Salvar</button>
      </div>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
